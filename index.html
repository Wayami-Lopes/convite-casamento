<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Convite de Casamento</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #fce4ec, #f8bbd0);
      text-align: center;
      padding: 50px;
    }

    .convite {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      display: inline-block;
    }

    h1 {
      color: #c2185b;
    }

    p {
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 30px;
      background: #c2185b;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
    }

    .btn:hover {
      background: #880e4f;
    }
  </style>
</head>

<body>

  <div class="convite">
    <h1>Inocêncio & Mila</h1>

    <p>Temos a alegria de convidar você para o nosso casamento 💍</p>

    <p>
      📅 Data: 04 de Outubro de 2026<br>
      ⏰ Hora: 14h30<br>
      📍 Local: Igreja Emanuel do Lubango
    </p>

    <p>Confirme sua presença clicando no botão abaixo:</p>

    <a class="btn" href="https://forms.gle/seulink" target="_blank">
      Confirmar Presença
    </a>
  </div>

</body>
</html>
